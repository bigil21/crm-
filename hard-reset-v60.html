<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-store" />
    <meta name="theme-color" content="#111111" />
    <title>Hard Reset CRM Session | Roofline CRM</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5f7fb;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(560px, 100%);
        border: 1px solid #d9e2ef;
        border-radius: 12px;
        background: #fff;
        padding: 26px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      }
      h1 { margin: 0 0 10px; font-size: 25px; }
      p { margin: 0; color: #64748b; line-height: 1.5; }
      #status { margin-top: 18px; color: #111827; font-weight: 700; }
      a { color: #0f5fe8; }
    </style>
  </head>
  <body>
    <main>
      <h1>Hard resetting CRM session</h1>
      <p>This clears only browser sign-in/session cache. It does not delete leads, jobs, estimates, or documents.</p>
      <p id="status" role="status" aria-live="polite">Starting...</p>
    </main>
    <script>
      (async function () {
        const status = document.querySelector("#status");
        const loginUrl = "/login.html?v=60&switchAccount=1&reason=session-reset&redirect=%2F%3Fadmin-check%3Dv60";

        function setStatus(message) {
          status.textContent = message;
        }

        function isAuthKey(key) {
          return key.startsWith("sb-") || key.includes("supabase.auth.token") || key.includes("supabase.auth");
        }

        function clearStorage(store) {
          const keys = [];
          for (let index = 0; index < store.length; index += 1) {
            const key = store.key(index) || "";
            if (isAuthKey(key)) keys.push(key);
          }
          keys.forEach((key) => store.removeItem(key));
        }

        async function clearIndexedDb() {
          if (!indexedDB.databases) return;
          const dbs = await indexedDB.databases();
          await Promise.all(
            dbs.map((db) => db.name || "")
              .filter((name) => name.toLowerCase().includes("supabase") || name.toLowerCase().includes("auth"))
              .map((name) => new Promise((resolve) => {
                const request = indexedDB.deleteDatabase(name);
                request.onsuccess = resolve;
                request.onerror = resolve;
                request.onblocked = resolve;
              })),
          );
        }

        async function clearCaches() {
          if (!window.caches?.keys) return;
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        async function unregisterWorkers() {
          if (!navigator.serviceWorker?.getRegistrations) return;
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }

        try {
          setStatus("Clearing Supabase auth tokens...");
          clearStorage(localStorage);
          clearStorage(sessionStorage);

          setStatus("Clearing auth databases...");
          await clearIndexedDb();

          setStatus("Clearing old app cache...");
          await clearCaches();
          await unregisterWorkers();

          setStatus("Opening clean login page...");
          setTimeout(() => location.replace(loginUrl), 500);
        } catch (error) {
          status.innerHTML = `Cleanup hit a browser limitation. Open <a href="${loginUrl}">clean login</a> and click Clear Saved Session.`;
        }
      })();
    </script>
  </body>
</html>
