<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Launching Role Check | Roofline CRM</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #111827;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #d9e2ef;
        border-radius: 10px;
        padding: 22px;
        background: #fff;
        box-shadow: 0 20px 55px rgba(15, 23, 42, 0.12);
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0; color: #64748b; line-height: 1.5; }
      #status { margin-top: 14px; color: #0f5fe8; font-weight: 700; }
      a { color: #0f5fe8; }
    </style>
  </head>
  <body>
    <main>
      <h1>Preparing Role Security Check</h1>
      <p>This page updates the CRM service worker, then opens the CRM with the direct in-app role/security check enabled.</p>
      <p id="status">Starting...</p>
    </main>
    <script>
      const status = document.querySelector("#status");
      const target = "/?role-direct-check=v55";
      function go() { window.location.replace(target); }
      async function launch() {
        if (!("serviceWorker" in navigator)) {
          status.textContent = "Service workers are unavailable. Opening CRM directly...";
          go();
          return;
        }
        try {
          status.textContent = "Registering latest CRM worker...";
          const registration = await navigator.serviceWorker.register("sw.js?v=55");
          await registration.update();
          status.textContent = "Waiting for latest worker to control this tab...";
          if (navigator.serviceWorker.controller) {
            setTimeout(go, 500);
            return;
          }
          navigator.serviceWorker.addEventListener("controllerchange", () => setTimeout(go, 300), { once: true });
          setTimeout(go, 3000);
        } catch (error) {
          status.innerHTML = `Could not update the worker automatically. <a href="${target}">Open the check directly</a>.`;
        }
      }
      launch();
    </script>
  </body>
</html>
