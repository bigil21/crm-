<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roofline CRM Profit Role Test</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #64748b;
        --line: #d9e2ef;
        --surface: #ffffff;
        --soft: #f5f7fb;
        --pass: #15803d;
        --warn: #b45309;
        --fail: #b91c1c;
        --blue: #0f5fe8;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--soft); color: var(--ink); }
      header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 22px; background: #0b1220; color: #fff; }
      h1 { margin: 0; font-size: 20px; }
      header p { margin: 4px 0 0; color: #cbd5e1; font-size: 13px; }
      button { border: 0; border-radius: 8px; background: var(--blue); color: #fff; padding: 10px 14px; font-weight: 700; cursor: pointer; }
      button.secondary { background: #334155; }
      main { display: grid; grid-template-columns: 430px minmax(0, 1fr); min-height: calc(100vh - 74px); }
      .panel { padding: 18px; border-right: 1px solid var(--line); background: var(--surface); overflow: auto; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
      .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
      .summary div { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: var(--soft); }
      .summary strong { display: block; font-size: 20px; }
      .summary span { display: block; color: var(--muted); font-size: 12px; }
      .results { display: grid; gap: 8px; }
      .result { border: 1px solid var(--line); border-left-width: 5px; border-radius: 8px; padding: 10px; background: #fff; }
      .result.pass { border-left-color: var(--pass); }
      .result.warn { border-left-color: var(--warn); }
      .result.fail { border-left-color: var(--fail); }
      .result strong { display: block; font-size: 14px; }
      .result span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; overflow-wrap: anywhere; }
      iframe { width: 100%; height: 100%; min-height: calc(100vh - 74px); border: 0; background: #fff; }
      pre { max-height: 220px; overflow: auto; padding: 10px; border-radius: 8px; background: #0b1220; color: #e2e8f0; font-size: 12px; }
      @media (max-width: 900px) { main { grid-template-columns: 1fr; } iframe { min-height: 720px; } }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Profit & Cost Role Test</h1>
        <p>Creates one temporary lead for the signed-in account, checks financial tab access, then restores storage.</p>
      </div>
      <button id="runTest" type="button">Run Profit Test</button>
    </header>
    <main>
      <section class="panel">
        <div class="actions">
          <button id="copyResults" type="button" class="secondary">Copy Results</button>
          <button id="openApp" type="button" class="secondary">Open CRM</button>
        </div>
        <div class="summary">
          <div><strong id="passCount">0</strong><span>Pass</span></div>
          <div><strong id="warnCount">0</strong><span>Warnings</span></div>
          <div><strong id="failCount">0</strong><span>Fail</span></div>
        </div>
        <div id="results" class="results"></div>
        <pre id="rawResults" hidden></pre>
      </section>
      <iframe id="crmFrame" title="CRM under profit role test" src="./?profit-role-test=ready"></iframe>
    </main>

    <script>
      const frame = document.querySelector("#crmFrame");
      const resultsEl = document.querySelector("#results");
      const rawResultsEl = document.querySelector("#rawResults");
      const results = [];
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const upperFinancialEmails = ["gil@coastalcrestroofing.com", "devon@coastalcrestroofing.com"];

      function counts() {
        document.querySelector("#passCount").textContent = results.filter((item) => item.status === "pass").length;
        document.querySelector("#warnCount").textContent = results.filter((item) => item.status === "warn").length;
        document.querySelector("#failCount").textContent = results.filter((item) => item.status === "fail").length;
      }

      function render() {
        resultsEl.innerHTML = results.map((item) => `<article class="result ${item.status}"><strong>${item.name}</strong><span>${item.detail}</span></article>`).join("");
        rawResultsEl.textContent = JSON.stringify({ ranAt: new Date().toISOString(), results }, null, 2);
        counts();
      }

      function add(status, name, detail) {
        results.push({ status, name, detail });
        render();
      }

      function reset() {
        results.length = 0;
        add("warn", "Diagnostics", "Starting profit/cost role test. A temporary QA lead will be created and then removed.");
      }

      function doc() {
        try { return frame.contentDocument || frame.contentWindow.document; } catch { return null; }
      }

      function win() {
        try { return frame.contentWindow; } catch { return null; }
      }

      function visible(node) {
        if (!node) return false;
        const styles = win().getComputedStyle(node);
        return !node.classList.contains("hidden") && styles.display !== "none" && styles.visibility !== "hidden";
      }

      function parseJson(value) {
        try { return JSON.parse(value || "{}"); } catch { return {}; }
      }

      function expectedFinancials(role, email) {
        return role === "admin" || upperFinancialEmails.includes(String(email || "").toLowerCase());
      }

      function expectBoolean(name, actual, expected, passDetail, failDetail) {
        add(actual === expected ? "pass" : "fail", name, actual === expected ? passDetail : failDetail);
      }

      async function waitForApp(timeoutMs = 12000) {
        const started = Date.now();
        while (Date.now() - started < timeoutMs) {
          const currentDoc = doc();
          if (currentDoc?.querySelector("#globalSearch") && currentDoc.querySelector("#dashboardView")) return currentDoc;
          if (currentDoc?.querySelector("#loginForm")) return currentDoc;
          await sleep(250);
        }
        return doc();
      }

      async function reloadFrame(search) {
        frame.src = `./?${search}&t=${Date.now()}`;
        await new Promise((resolve) => {
          const done = () => {
            frame.removeEventListener("load", done);
            resolve();
          };
          frame.addEventListener("load", done);
        });
        await waitForApp();
      }

      function makeTempContact(id, email) {
        return {
          id,
          type: "Lead",
          status: "New",
          name: "ZZ QA Profit Role Test",
          source: "Diagnostic",
          salesRep: email || "QA",
          email: "qa-profit-role@example.com",
          phone: "555-0100",
          address: "100 QA Test Way",
          value: 2500,
          lastContact: new Date().toISOString().slice(0, 10),
          notes: "Temporary diagnostic lead. This should be removed automatically.",
          jobs: [{
            id: `${id}_job`,
            name: "QA Profit Role Test Job",
            address: "100 QA Test Way",
            status: "New",
            salesRep: email || "QA",
            value: 2500,
            notes: "Temporary diagnostic job.",
            costs: [{
              id: `${id}_cost`,
              date: new Date().toISOString().slice(0, 10),
              category: "Materials",
              vendor: "QA Vendor",
              amount: 100,
              description: "Temporary diagnostic cost.",
              paid: false,
            }],
          }],
          documents: [],
          updates: [],
        };
      }

      async function runProfitRoleTest() {
        reset();
        let currentDoc = await waitForApp();
        let currentWin = win();
        if (!currentDoc || !currentWin) {
          add("fail", "CRM Load", "Could not access the CRM frame.");
          return;
        }
        if (currentDoc.querySelector("#loginForm")) {
          add("fail", "Authentication", "The CRM frame is on the login page. Sign in first, then reload this page.");
          return;
        }
        add("pass", "CRM Load", `Loaded ${currentWin.location.pathname}${currentWin.location.search}.`);

        let auth = null;
        try {
          auth = await currentWin.RooflineAuth?.getTrustedUser?.();
        } catch (error) {
          add("fail", "Authentication", error.message || String(error));
          return;
        }

        const email = String(auth?.user?.email || "").toLowerCase();
        const role = typeof currentWin.currentRole === "function" ? currentWin.currentRole() : auth?.role || "viewer";
        const userId = auth?.user?.id || "";
        const storageKey = userId ? `roofline-crm-v1:${userId}` : "";
        const canUseFinancials = expectedFinancials(role, email);

        add(email ? "pass" : "fail", "Signed-In User", email ? `${email} / role: ${role}` : "No signed-in user email was available.");
        if (!storageKey) {
          add("fail", "Active User Storage", "No active user storage key could be resolved.");
          return;
        }
        expectBoolean(
          "Permission Function: Job Financials",
          currentWin.canManageJobFinancials?.() === true,
          canUseFinancials,
          canUseFinancials ? `Financial permission is allowed for ${role}/${email}.` : `Financial permission is denied for ${role}/${email}.`,
          `Financial permission function does not match ${role}/${email}.`,
        );

        const original = currentWin.localStorage.getItem(storageKey);
        const tempId = `qa_profit_${Date.now()}`;
        const parsed = parseJson(original);
        const contacts = Array.isArray(parsed.contacts) ? parsed.contacts : [];
        const tempContact = makeTempContact(tempId, email);
        let cleanupStatus = "warn";
        let cleanupDetail = "Cleanup did not run.";

        try {
          const updated = {
            ...parsed,
            contacts: [tempContact, ...contacts.filter((contact) => contact?.id !== tempId)],
          };
          currentWin.localStorage.setItem(storageKey, JSON.stringify(updated));
          add("pass", "Temporary Lead", `Created temporary QA lead ${tempId} in ${storageKey}.`);

          await reloadFrame(`profit-role-test=${encodeURIComponent(tempId)}`);
          currentDoc = doc();
          currentWin = win();
          if (typeof currentWin.openLeadDetail !== "function") {
            add("fail", "Profit/Cost Tab", "openLeadDetail() is not available.");
            return;
          }

          currentWin.openLeadDetail(tempId, "profit");
          await sleep(800);
          const profitTab = currentDoc.querySelector('[data-lead-tab="profit"]');
          const profitPanel = currentDoc.querySelector("#leadProfitPanel");
          const tabVisible = visible(profitTab);
          const panelVisible = visible(profitPanel);

          expectBoolean(
            "Profit/Cost Tab Visibility",
            tabVisible,
            canUseFinancials,
            canUseFinancials ? "Profit/cost tab is visible for this account." : "Profit/cost tab is hidden for this account.",
            canUseFinancials ? "Profit/cost tab should be visible but is hidden." : "Profit/cost tab should be hidden but is visible.",
          );

          if (!canUseFinancials) {
            expectBoolean(
              "Profit/Cost Panel Access",
              panelVisible,
              false,
              "Profit/cost panel did not open for restricted account.",
              "Profit/cost panel opened for restricted account.",
            );
          } else {
            expectBoolean(
              "Profit/Cost Panel Access",
              panelVisible,
              true,
              "Profit/cost panel opened for upper admin account.",
              "Profit/cost panel should open for upper admin account.",
            );
          }
        } finally {
          const latestWin = win();
          if (latestWin) {
            if (original === null) latestWin.localStorage.removeItem(storageKey);
            else latestWin.localStorage.setItem(storageKey, original);
            cleanupStatus = "pass";
            cleanupDetail = `Temporary QA lead ${tempId} was removed and ${storageKey} was restored.`;
          }
          add(cleanupStatus, "Cleanup", cleanupDetail);
          try {
            await reloadFrame("profit-role-test=cleanup");
          } catch {
            // The storage cleanup already completed.
          }
        }
      }

      document.querySelector("#runTest").addEventListener("click", runProfitRoleTest);
      document.querySelector("#openApp").addEventListener("click", () => window.open("./", "_blank"));
      document.querySelector("#copyResults").addEventListener("click", async () => {
        rawResultsEl.hidden = false;
        try {
          await navigator.clipboard.writeText(rawResultsEl.textContent);
          add("pass", "Copy Results", "Diagnostics JSON copied to clipboard.");
        } catch {
          add("warn", "Copy Results", "Clipboard was blocked. Results JSON is shown below.");
        }
      });
    </script>
  </body>
</html>
